<head>
  <!-- Global site tag (gtag.js) - Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-J1M2197DZY"></script>
  <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-J1M2197DZY');
  </script>

  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">

  {% unless site.plugins contains "jekyll-seo-tag" %}
    <title>{{ page.title }} - {{ site.title }}</title>

    {% if page.description %}
      <meta name="Description" content="{{ page.description }}">
    {% endif %}
  {% endunless %}

  <link rel="shortcut icon" href="{{ 'favicon.ico' | relative_url }}" type="image/x-icon">

  <link rel="stylesheet" href="{{ '/assets/css/just-the-docs-default.css' | relative_url }}">

  {% if site.search_enabled != false %}
    <script type="text/javascript" src="{{ '/assets/js/vendor/lunr.min.js' | relative_url }}"></script>
  {% endif %}
  <script type="text/javascript" src="{{ '/assets/js/just-the-docs.js' | relative_url }}"></script>

  <script>
    // Make certain parent nav items open their main page even when the user clicks the
    // expander arrow (which normally only toggles the submenu). Keyed by the parent's
    // nav link path -> the page to open.
    document.addEventListener('DOMContentLoaded', function () {
      var MAP = {
        '/others/newsletter.html': '/others/newsletter.html',   // EEGLAB Newsletter
        '/others/': '/others/How_to_download_EEGLAB.html'        // Download EEGLAB
      };
      document.querySelectorAll('a.nav-list-link').forEach(function (link) {
        var path;
        try { path = new URL(link.getAttribute('href'), location.origin).pathname; }
        catch (e) { return; }
        var dest = MAP[path];
        if (!dest) return;
        var item = link.closest('.nav-list-item');
        var exp = item && item.querySelector(':scope > .nav-list-expander');
        if (exp) {
          exp.addEventListener('click', function () { window.location.href = dest; });
        }
      });
    });
  </script>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  {% seo %}

  {% include timezone_converter.html %}

</head>
